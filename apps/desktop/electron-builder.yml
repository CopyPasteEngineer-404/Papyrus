# Papyrus Electron Builder Configuration
# Custom installer with Papyrus branding

appId: com.papyrus.desktop
productName: Papyrus
copyright: Copyright © 2024 Papyrus

# Directory settings
directories:
  output: dist/build
  buildResources: build

# Files to include in the build
files:
  - dist/electron/**/*
  - dist/renderer/**/*
  - "!node_modules/**/*"

# Extra resources - bundle the sample workspace
extraResources:
  - from: "../../sample-workspace"
    to: "sample-workspace"
    filter:
      - "**/*"

# Windows configuration
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "Papyrus-Setup-${version}.${ext}"

# NSIS installer customization
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  installerHeader: build/installerHeader.bmp
  installerSidebar: build/installerSidebar.bmp
  license: ../../LICENSE
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Papyrus
  artifactName: "Papyrus-Setup-${version}.${ext}"
  # Custom installer pages
  include: build/installer.nsh
  installerLanguages:
    - en_US

# macOS configuration
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
  artifactName: "Papyrus-${version}-mac.${ext}"

# Linux configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Office
  artifactName: "Papyrus-${version}-linux.${ext}"

# Auto-update configuration (optional)
publish:
  provider: generic
  url: https://releases.papyrus.dev
